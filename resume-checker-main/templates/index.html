<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Checker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow p-4">
                <h2 class="mb-3 text-center">Resume Checker</h2>
                <p class="text-center text-muted mb-4">
                    Upload your resume and compare it against a job description.
                </p>

                {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="resume" class="form-label">Upload Resume (PDF)</label>
                        <input
                            type="file"
                            class="form-control"
                            id="resume"
                            name="resume"
                            accept=".pdf"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description</label>
                        <textarea
                            class="form-control"
                            id="job_description"
                            name="job_description"
                            rows="8"
                            placeholder="Paste the job description here..."
                            required
                        ></textarea>
                    </div>

                    <div class="text-center">
                        <button class="btn btn-primary px-4" type="submit">
                            Analyze Resume
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <div>
                    <h5>Supported Skills</h5>
                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <span class="badge bg-primary">Python</span>
                        <span class="badge bg-primary">Flask</span>
                        <span class="badge bg-primary">SQL</span>
                        <span class="badge bg-primary">Data Analysis</span>
                        <span class="badge bg-primary">Machine Learning</span>
                        <span class="badge bg-primary">HTML</span>
                        <span class="badge bg-primary">CSS</span>
                        <span class="badge bg-primary">JavaScript</span>
                        <span class="badge bg-primary">Git</span>
                        <span class="badge bg-primary">GitHub</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
